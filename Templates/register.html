<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRAS — Register Student</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="shell">

  <div class="sidebar">
    <div class="logo">FRAS</div>
    <ul>
      <li><a href="/">Dashboard</a></li>
      <li><a href="/recognition">Start Attendance</a></li>
      <li><a href="/register">Register Student</a></li>
      <li><a href="/attendance">Attendance</a></li>
      <li><a href="/students">Students</a></li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </div>

  <div class="main">

    <h2>Register Student</h2>
    <p class="page-sub">Add a new student and capture their face data</p>

    {% if error %}
    <div style="background:#fde8e8; color:#b91c1c; border:1px solid #f5c2c2;
                padding:14px 18px; border-radius:10px; margin-top:20px;
                font-size:14px; font-weight:500;">
      ⚠ {{ error }}
    </div>
    {% endif %}

    <div class="camera-box">
      <h3>Camera Preview</h3>
      <img id="camera" src="" alt="Camera feed">
      <br><br>
      <div style="display:flex; gap:10px;">
        <button type="button" onclick="startCamera()">Start Camera</button>
        <button type="button" onclick="stopCamera()">Stop Camera</button>
      </div>
    </div>

    <form method="POST">

      <div class="form-group">
        <label class="form-label">Student ID</label>
        <input class="form-input" type="number" name="student_id"
               placeholder="e.g. 1001" required>
      </div>

      <div class="form-group">
        <label class="form-label">Student Name</label>
        <input class="form-input" type="text" name="name"
               placeholder="Full name" required>
      </div>

      <div style="display:flex; gap:12px; align-items:center;">
        <button type="submit" class="btn-primary">Register & Capture Face</button>
        <a href="/" class="btn btn-outline">Cancel</a>
      </div>

    </form>

  </div>

</div>

<script>
let cameraRunning = false;
function startCamera() {
  if (!cameraRunning) {
    document.getElementById("camera").src = "/video_feed";
    cameraRunning = true;
  }
}
function stopCamera() {
  document.getElementById("camera").src = "";
  cameraRunning = false;
}
</script>

</body>
</html>
