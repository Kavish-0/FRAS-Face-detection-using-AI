<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="{{ url_for('static', filename='script.js') }}"></script>

</head>

<body>

<div class="shell">

<div class="sidebar">

<div class="logo">FRAS</div>

<ul>

<li><a href="/">🏠 Dashboard</a></li>

<li>
<button onclick="startRecognition()" class="btn btn-primary">
📷 Start Attendance
</button>
</li>

<li><a href="/register">➕ Register Student</a></li>

<li><a href="/attendance">📊 Attendance Records</a></li>

<li><a href="/students">👨‍🎓 Students</a></li>

<li><a href="/logout">🚪 Logout</a></li>

</ul>

</div>

<div class="main">

<h2>Admin Overview</h2>

<div class="cards">

<div class="stat-card">
<h3>Total Students</h3>
<p>{{ total_students }}</p>
</div>

<div class="stat-card">
<h3>Today's Attendance</h3>
<p>{{ today_attendance }}</p>
</div>

<div class="stat-card">
<h3>Last Marked</h3>
<p>{{ last_student }}</p>
</div>

<div class="stat-card">
<h3>System Status</h3>
<p style="color:#22c55e;">Active</p>
</div>

</div>

</div>

</div>

</body>
</html>
