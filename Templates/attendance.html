<!DOCTYPE html>
<html>

<head>

<title>Attendance Records</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="main">

<h2>Attendance Records</h2>

<table>

<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
</tr>

{% for row in records %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/" class="btn">Back to Dashboard</a>

</div>

</body>
</html>
